<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Authority Matrix Bot — Viaduct Internal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f5;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .header {
    background: #1a1a2e;
    color: #fff;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-icon {
    width: 36px; height: 36px;
    background: #0571DD;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .header-text h1 { font-size: 16px; font-weight: 600; }
  .header-text p { font-size: 12px; color: #aaa; }
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .message {
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    gap: 12px;
  }
  .message.user { flex-direction: row-reverse; }
  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .avatar.bot { background: #0571DD; color: #fff; }
  .avatar.user { background: #444; color: #fff; }
  .bubble {
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
  }
  .message.bot .bubble {
    background: #fff;
    color: #333;
    border: 1px solid #e0e0e0;
  }
  .message.user .bubble {
    background: #0571DD;
    color: #fff;
  }
  .bubble table {
    border-collapse: collapse;
    margin: 8px 0;
    font-size: 13px;
    width: 100%;
  }
  .bubble th, .bubble td {
    border: 1px solid #ddd;
    padding: 6px 10px;
    text-align: left;
  }
  .bubble th { background: #f0f4f8; font-weight: 600; }
  .bubble strong { font-weight: 600; }
  .bubble code {
    background: #f0f0f0;
    padding: 1px 4px;
    border-radius: 3px;
    font-size: 13px;
  }
  .input-area {
    background: #fff;
    border-top: 1px solid #e0e0e0;
    padding: 16px 24px;
  }
  .input-row {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
  }
  .input-row input {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
  }
  .input-row input:focus { border-color: #0571DD; }
  .input-row button {
    padding: 12px 24px;
    background: #0571DD;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 500;
  }
  .input-row button:hover { background: #0460c2; }
  .input-row button:disabled { background: #aaa; cursor: not-allowed; }
  .samples {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 8px 0 0;
  }
  .sample-btn {
    padding: 6px 12px;
    background: #f0f4f8;
    border: 1px solid #ddd;
    border-radius: 16px;
    font-size: 12px;
    cursor: pointer;
    color: #555;
  }
  .sample-btn:hover { background: #e0e8f0; }
  .typing { opacity: 0.6; font-style: italic; }
  .disclaimer {
    text-align: center;
    font-size: 11px;
    color: #999;
    padding: 4px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">&#9878;</div>
  <div class="header-text">
    <h1>Authority Matrix Bot</h1>
    <p>VIA-BR-001 Internal Authority Matrix — Advisory Tool</p>
  </div>
</div>

<div class="chat-area" id="chatArea">
  <div class="message bot">
    <div class="avatar bot">&#9878;</div>
    <div class="bubble">Viaduct Authority Matrix Botです。
業務上の決裁権限について質問してください。

例:
・「スロベニアで€33,000の部品を購入する場合、決裁者は？」
・「新しいエンジニアを予算外で採用したい」
・「$80,000の設備を購入するフローは？」</div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <input type="text" id="userInput" placeholder="決裁権限について質問してください..." autofocus>
    <button id="sendBtn" onclick="sendMessage()">送信</button>
  </div>
  <div class="samples" id="samples">
    <button class="sample-btn" onclick="fillSample(this)">€33,000の部品購入の決裁者は？</button>
    <button class="sample-btn" onclick="fillSample(this)">予算外でエンジニア採用する場合</button>
    <button class="sample-btn" onclick="fillSample(this)">$3,000のSaaSツール契約</button>
    <button class="sample-btn" onclick="fillSample(this)">NDAの承認フロー</button>
    <button class="sample-btn" onclick="fillSample(this)">$80,000の設備購入</button>
  </div>
  <div class="disclaimer">Advisory tool only — answers do not constitute formal approval.</div>
</div>

<script>
const chatArea = document.getElementById("chatArea");
const userInput = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");
const samplesDiv = document.getElementById("samples");
let conversationHistory = [];

userInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.isComposing && !sendBtn.disabled) sendMessage();
});

function fillSample(btn) {
  userInput.value = btn.textContent;
  userInput.focus();
}

function addMessage(role, text) {
  const div = document.createElement("div");
  div.className = `message ${role}`;
  const avatar = document.createElement("div");
  avatar.className = `avatar ${role}`;
  avatar.innerHTML = role === "bot" ? "&#9878;" : "&#9786;";
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  if (role === "bot") {
    bubble.innerHTML = formatMarkdown(text);
  } else {
    bubble.textContent = text;
  }
  div.appendChild(avatar);
  div.appendChild(bubble);
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  return div;
}

function formatMarkdown(text) {
  // Simple markdown: bold, tables, line breaks
  let html = text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");

  // Tables
  html = html.replace(/^(\|.+\|)\n(\|[-| :]+\|)\n((?:\|.+\|\n?)+)/gm, (match, header, sep, body) => {
    const headers = header.split("|").filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join("");
    const rows = body.trim().split("\n").map(row => {
      const cells = row.split("|").filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join("");
      return `<tr>${cells}</tr>`;
    }).join("");
    return `<table><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table>`;
  });

  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  // Code
  html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
  // Line breaks
  html = html.replace(/\n/g, "<br>");
  return html;
}

async function sendMessage() {
  const text = userInput.value.trim();
  if (!text) return;

  userInput.value = "";
  sendBtn.disabled = true;
  samplesDiv.style.display = "none";

  addMessage("user", text);
  conversationHistory.push({ role: "user", content: text });

  const typingDiv = addMessage("bot", "考えています...");
  typingDiv.querySelector(".bubble").className = "bubble typing";

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: conversationHistory }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    chatArea.removeChild(typingDiv);
    addMessage("bot", data.content);
    conversationHistory.push({ role: "assistant", content: data.content });
  } catch (err) {
    chatArea.removeChild(typingDiv);
    addMessage("bot", "エラーが発生しました: " + err.message);
  }

  sendBtn.disabled = false;
  userInput.focus();
}
</script>
</body>
</html>
